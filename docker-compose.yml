version: "3.9"

services:
  # ── Finance Pipeline API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-pipeline-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  # ── Ollama (local SLM) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: finance-pipeline-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  ollama_data:
    driver: local
